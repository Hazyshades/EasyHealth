name: Measurement Registry

on:
  pull_request:
    paths:
      - ".github/workflows/measurement-registry.yml"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "src/lib/biomarkers/**"
      - "src/lib/documents/**"
      - "scripts/**"
      - "docs/biomarker-registry/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/measurement-registry.yml"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "src/lib/biomarkers/**"
      - "src/lib/documents/**"
      - "scripts/**"
      - "docs/biomarker-registry/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm verify:registry
